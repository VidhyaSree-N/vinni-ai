<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vinni AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #06060f; color: #ececec;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 20px; border-bottom: 1px solid #1a0a2e;
      background: rgba(10,10,20,0.85); backdrop-filter: blur(12px);
      z-index: 20; flex-shrink: 0;
    }
    .bloom {
      width: 34px; height: 34px; border-radius: 50%;
      background: radial-gradient(circle at 40% 35%, #e2d4ff, #c084fc, #7c3aed88);
      border: 1px solid #7c3aed66; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      animation: bloomPulse 3s ease-in-out infinite;
    }
    @keyframes bloomPulse { 0%,100%{box-shadow:0 0 8px #7c3aed44}50%{box-shadow:0 0 20px #7c3aed88} }
    .header-info h1 { font-size: 15px; font-weight: 600; color: #e2d4ff; }
    .header-info p  { font-size: 11px; color: #5b21b6; letter-spacing: 1px; text-transform: uppercase; }
    .mode-toggle {
      margin-left: auto; display: flex;
      background: #0d0020; border: 1px solid #2a0a4e; border-radius: 8px; overflow: hidden;
    }
    .mode-btn {
      padding: 6px 16px; font-size: 12px; font-weight: 500;
      border: none; background: transparent; color: #5b21b6; cursor: pointer; transition: all 0.15s;
    }
    .mode-btn.active { background: #7c3aed; color: white; }

    /* ── VOICE MODE ── */
    #voice-mode { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    #voice-mode.hidden { display: none; }

    #vinni-fullscreen {
      flex: 1; display: flex; overflow: hidden; background: #06060f;
    }
    #vinni-left {
      width: 55%; height: 100%; flex-shrink: 0;
      overflow: hidden; border-right: 1px solid #1a0a2e; background: #87CEEB;
      display: flex; align-items: flex-start;
    }
    #vinni-gif { 
      width: 100%; 
      height: auto; 
      display: block;
      flex-shrink: 0;
    }

    #right-panel {
      flex: 1; display: flex; flex-direction: column;
      background: #08080f; overflow: hidden;
      border-left: 1px solid #1a0a2e;
    }
    #voice-chat {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth;
      background: linear-gradient(180deg, #0a0a18 0%, #06060f 100%);
    }
    #voice-chat::-webkit-scrollbar { width: 3px; }
    #voice-chat::-webkit-scrollbar-thumb { background: #2a0a4e; border-radius: 4px; }
    #voice-chat-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 8px;
      color: #2a0a4e; font-size: 13px; text-align: center; padding: 20px;
    }
    #voice-chat-empty .e-icon { font-size: 32px; margin-bottom: 4px; opacity: 0.4; }
    #cam-right {
      flex-shrink: 0; height: 0;
      border-top: 0px solid #1a0a2e; overflow: hidden;
      transition: height 0.3s ease;
    }
    #cam-right video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    #cam-right.visible { display: block; height: 60%; border-top: 1px solid #1a0a2e; }

    #state-label {
      position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: #c084fc; letter-spacing: 1.5px; text-transform: uppercase;
      background: rgba(6,6,15,0.7); padding: 4px 14px;
      border-radius: 20px; border: 1px solid #2a0a4e; white-space: nowrap; z-index: 5;
    }

    #voice-bottom {
      flex-shrink: 0; padding: 14px 20px 24px;
      background: rgba(6,6,15,0.9); backdrop-filter: blur(16px);
      border-top: 1px solid #1a0a2e;
      display: flex; align-items: center; justify-content: center; gap: 20px;
    }
    #mic-btn {
      width: 60px; height: 60px; border-radius: 50%;
      border: 2px solid #7c3aed; background: #0d0020; color: #c084fc;
      font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; transition: all 0.2s;
    }
    #mic-btn.listening { background:#0d3320; border-color:#22c55e; color:#22c55e; box-shadow:0 0 24px #22c55e55; }
    #mic-btn.speaking  { background:#1a0800; border-color:#f59e0b; color:#f59e0b; box-shadow:0 0 24px #f59e0b55; }
    #mic-btn.thinking  { border-color:#7c3aed; animation:spin 1s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1px solid #2a0a4e; background: #0d0020; color: #7c3aed;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: all 0.2s;
    }
    .icon-btn:hover, .icon-btn.active { border-color:#7c3aed; background:#1a0a3e; color:#c084fc; }

    .wave-bars { display:flex; gap:3px; align-items:center; height:22px; }
    .wave-bar  { width:3px; border-radius:2px; animation:wave 0.8s infinite; }
    .wave-bar:nth-child(1){height:5px;background:#4a1d96;animation-delay:0s}
    .wave-bar:nth-child(2){height:14px;background:#6d28d9;animation-delay:.1s}
    .wave-bar:nth-child(3){height:9px;background:#7c3aed;animation-delay:.2s}
    .wave-bar:nth-child(4){height:18px;background:#8b5cf6;animation-delay:.15s}
    .wave-bar:nth-child(5){height:11px;background:#a78bfa;animation-delay:.25s}
    .wave-bar:nth-child(6){height:16px;background:#c084fc;animation-delay:.05s}
    .wave-bar:nth-child(7){height:7px;background:#a78bfa;animation-delay:.3s}
    @keyframes wave{0%,100%{transform:scaleY(0.4);opacity:0.4}50%{transform:scaleY(1.2);opacity:1}}
    .wave-bars.idle .wave-bar { animation:none; transform:scaleY(0.3); opacity:0.2; }

    /* ── TEXT MODE ── */
    #text-mode { flex:1; display:flex; flex-direction:column; overflow:hidden; }
    #text-mode.hidden { display:none; }
    #chat-zone {
      flex:1; overflow-y:auto; padding:16px 20px;
      display:flex; flex-direction:column; gap:14px; scroll-behavior:smooth;
    }
    #chat-zone::-webkit-scrollbar{width:3px}
    #chat-zone::-webkit-scrollbar-thumb{background:#2a0a4e;border-radius:4px}
    #text-input-bar {
      flex-shrink:0; padding:12px 20px 24px;
      background:rgba(10,10,20,0.9); backdrop-filter:blur(12px);
      border-top:1px solid #1a0a2e; display:flex; gap:10px; align-items:flex-end;
    }
    textarea {
      flex:1; background:#0d0020; border:0.5px solid #2a0a4e; border-radius:14px;
      padding:10px 14px; color:#e2d4ff; font-size:14px; font-family:inherit;
      resize:none; outline:none; max-height:120px; min-height:42px; line-height:1.5;
    }
    textarea::placeholder{color:#3a2a55}
    textarea:focus{border-color:#7c3aed}
    .send-btn {
      width:42px; height:42px; border-radius:12px;
      background:#7c3aed; border:none; color:white; cursor:pointer;
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .send-btn:hover{background:#6d28d9}
    .send-btn:disabled{background:#1a0a2e;cursor:not-allowed}

    /* shared message styles */
    .message{display:flex;gap:10px;max-width:680px;width:100%;animation:fadeUp 0.2s ease}
    .message.user{margin-left:auto;flex-direction:row-reverse}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .msg-av{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
    .message.vinni .msg-av{background:linear-gradient(135deg,#7c3aed,#06b6d4);color:white;font-weight:700}
    .message.user  .msg-av{background:#1a0a2e;color:#7c3aed;border:1px solid #2a0a4e}
    .msg-body{background:#0d0020;border:0.5px solid #7c3aed33;border-radius:16px;padding:10px 14px;font-size:13px;line-height:1.7;color:#e2d4ff;max-width:calc(100% - 40px)}
    .message.user .msg-body{background:#06b6d418;border-color:#06b6d455;color:#c8f5ff}
    .typing-dots{display:flex;gap:4px;align-items:center;padding:2px 0}
    .typing-dots span{width:6px;height:6px;border-radius:50%;background:#7c3aed;animation:dot 1.2s infinite}
    .typing-dots span:nth-child(2){animation-delay:.2s;background:#9333ea}
    .typing-dots span:nth-child(3){animation-delay:.4s;background:#c084fc}
    @keyframes dot{0%,60%,100%{opacity:0.2;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
  </style>
</head>
<body>

<header>
  <div class="bloom">🌸</div>
  <div class="header-info">
    <h1>Vinni</h1>
    <p id="header-status">● aware</p>
  </div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-voice" onclick="setMode('voice')">Voice</button>
    <button class="mode-btn"        id="btn-text"  onclick="setMode('text')">Text</button>
  </div>
</header>

<!-- VOICE MODE -->
<div id="voice-mode">
  <div id="vinni-fullscreen">
    <div id="vinni-left">
      <img id="vinni-gif" src="/static/Listening_vinni_v1.gif" alt="Vinni" />
    </div>
    <div id="right-panel">
      <div id="voice-chat">
        <div id="voice-chat-empty">
          <div class="e-icon">🌸</div>
          <div>Tap the mic and start talking</div>
          <div style="font-size:11px;opacity:0.6">Conversation will appear here</div>
        </div>
      </div>
      <div id="cam-right">
        <video id="cam-video" autoplay playsinline muted></video>
      </div>
    </div>
  </div>
  <div id="state-label">tap mic to start</div>
  <div id="voice-bottom">
    <button class="icon-btn" id="cam-btn" onclick="toggleCamera()" title="Camera">📷</button>
    <button id="mic-btn" onclick="toggleMic()">🎙</button>
    <div class="wave-bars idle" id="wave-bars">
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>
  </div>
</div>

<!-- TEXT MODE -->
<div id="text-mode" class="hidden">
  <div id="chat-zone"></div>
  <div id="text-input-bar">
    <textarea id="txt" placeholder="Ask Vinni anything..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="send-btn" onclick="sendText()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<script>
const API = "http://localhost:8000";
const SESSION_ID = crypto.randomUUID();
let voiceActive=false, mediaRecorder=null, audioChunks=[];
let audioCtx=null, analyser=null, activeStream=null, currentAudio=null;
let camStream=null, isLoading=false;
const SILENCE_THRESHOLD=15, SILENCE_DURATION=1500;

function setMode(mode) {
  document.getElementById('voice-mode').className = mode==='voice' ? '' : 'hidden';
  document.getElementById('text-mode').className  = mode==='text'  ? '' : 'hidden';
  document.getElementById('btn-voice').className  = 'mode-btn'+(mode==='voice'?' active':'');
  document.getElementById('btn-text').className   = 'mode-btn'+(mode==='text' ?' active':'');
  if(mode==='text' && voiceActive) stopVoice();
}

function setVinniGif(talking) {
  document.getElementById('vinni-gif').src = talking
    ? '/static/Talking_vinni_v1.gif' : '/static/Listening_vinni_v1.gif';
}

function setState(state) {
  const btn=document.getElementById('mic-btn');
  const sl=document.getElementById('state-label');
  const wb=document.getElementById('wave-bars');
  btn.className=state;
  const labels={listening:'listening...', speaking:'speaking...', thinking:'thinking...','':'tap mic to start'};
  sl.textContent=labels[state]||state;
  document.getElementById('header-status').textContent = state===''?'● aware':'● '+(labels[state]||state);
  wb.className='wave-bars'+(state===''?' idle':'');
  const icons={listening:'🎙', speaking:'🔊', thinking:'⚙️','':'🎙'};
  btn.textContent=icons[state]||'🎙';
  setVinniGif(state==='speaking');
}

function addMessage(containerId, role, text) {
  document.getElementById('voice-chat-empty')?.remove();
  const c=document.getElementById(containerId);
  const m=document.createElement('div');
  m.className=`message ${role}`;
  m.innerHTML=`<div class="msg-av">${role==='vinni'?'V':'U'}</div><div class="msg-body">${text.replace(/\n/g,'<br>')}</div>`;
  c.appendChild(m); c.scrollTop=c.scrollHeight;
}

function showTyping(containerId) {
  const c=document.getElementById(containerId);
  const m=document.createElement('div');
  m.className='message vinni'; m.id='typing-'+containerId;
  m.innerHTML=`<div class="msg-av">V</div><div class="msg-body"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  c.appendChild(m); c.scrollTop=c.scrollHeight;
}
function hideTyping(containerId) { document.getElementById('typing-'+containerId)?.remove(); }

async function toggleCamera() {
  const panel=document.getElementById('cam-right');
  const btn=document.getElementById('cam-btn');
  if(camStream) {
    camStream.getTracks().forEach(t=>t.stop()); camStream=null;
    panel.classList.remove('visible'); btn.classList.remove('active');
  } else {
    try {
      camStream=await navigator.mediaDevices.getUserMedia({
        video:{ facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
        audio:false
      });
      document.getElementById('cam-video').srcObject=camStream;
      panel.classList.add('visible'); btn.classList.add('active');
    } catch(e){ alert('Camera access denied'); }
  }
}

function toggleMic(){ voiceActive ? stopVoice() : startVoice(); }

async function startVoice() {
  try {
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    activeStream=stream; voiceActive=true; listenForSpeech(stream);
  } catch(e){ alert('Microphone access denied'); }
}

function stopVoice() {
  voiceActive=false;
  if(mediaRecorder && mediaRecorder.state!=='inactive') mediaRecorder.stop();
  if(activeStream) activeStream.getTracks().forEach(t=>t.stop());
  activeStream=null;
  if(audioCtx){ audioCtx.close(); audioCtx=null; analyser=null; }
  if(currentAudio){ currentAudio.pause(); currentAudio=null; }
  setState('');
}

function listenForSpeech(stream) {
  if(!voiceActive) return;
  setState('listening');
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser(); analyser.fftSize=256;
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  mediaRecorder=new MediaRecorder(stream);
  audioChunks=[];
  let speechDetected=false, silenceStart=null, running=true;
  mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) audioChunks.push(e.data); };
  mediaRecorder.onstop=async()=>{
    running=false;
    if(speechDetected && audioChunks.length && voiceActive) await sendVoice();
    else if(voiceActive) listenForSpeech(stream);
  };
  mediaRecorder.start(100);
  const arr=new Uint8Array(analyser.frequencyBinCount);
  const check=()=>{
    if(!running||!voiceActive||!analyser) return;
    analyser.getByteFrequencyData(arr);
    const vol=arr.reduce((a,b)=>a+b,0)/arr.length;
    if(vol>SILENCE_THRESHOLD){ speechDetected=true; silenceStart=null; }
    else if(speechDetected){
      if(!silenceStart) silenceStart=Date.now();
      if(Date.now()-silenceStart>SILENCE_DURATION){
        if(mediaRecorder.state==='recording') mediaRecorder.stop();
        return;
      }
    }
    requestAnimationFrame(check);
  };
  requestAnimationFrame(check);
}

async function sendVoice() {
  setState('thinking');
  const blob=new Blob(audioChunks,{type:'audio/webm'});
  const fd=new FormData();
  fd.append('audio',blob,'recording.webm');
  fd.append('session_id',SESSION_ID);
  fd.append('use_did','false');
  try {
    const res=await fetch(`${API}/voice`,{method:'POST',body:fd});
    if(!res.ok) throw new Error('failed');
    const transcription=decodeURIComponent(res.headers.get('X-Transcription')||'');
    const reply=decodeURIComponent(res.headers.get('X-Reply')||'');
    if(transcription) addMessage('voice-chat','user',`🎙 ${transcription}`);
    if(reply) addMessage('voice-chat','vinni',reply);
    const aBlob=await res.blob();
    const aUrl=URL.createObjectURL(aBlob);
    currentAudio=new Audio(aUrl);
    setState('speaking');
    currentAudio.onended=()=>{
      URL.revokeObjectURL(aUrl); currentAudio=null;
      if(voiceActive) navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{activeStream=s;listenForSpeech(s);});
    };
    currentAudio.play();
  } catch(e){
    setState('');
    if(voiceActive) navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{activeStream=s;listenForSpeech(s);});
  }
}

async function sendText() {
  const inp=document.getElementById('txt');
  const q=inp.value.trim();
  if(!q||isLoading) return;
  inp.value=''; inp.style.height='auto';
  isLoading=true; document.getElementById('send-btn').disabled=true;
  addMessage('chat-zone','user',q); showTyping('chat-zone');
  try {
    const res=await fetch(`${API}/ask`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,session_id:SESSION_ID})});
    const data=await res.json();
    hideTyping('chat-zone'); addMessage('chat-zone','vinni',data.answer);
  } catch(e){ hideTyping('chat-zone'); addMessage('chat-zone','vinni',"Sorry, couldn't connect."); }
  isLoading=false; document.getElementById('send-btn').disabled=false;
}

function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendText();} }
function autoResize(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
</script>
</body>
</html>
